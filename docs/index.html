<!doctype html><html><head><meta charset="utf-8"><title>Trialwatch</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
<style>body{margin:0;background:#1E1706;color:#fff;font-family:-apple-system,Helvetica,Arial,sans-serif;display:flex;flex-direction:column;align-items:center;min-height:100vh;padding:48px 24px;box-sizing:border-box;}
    .wrap{max-width:640px;text-align:center;}
    h1{color:#FFB020;font-size:2.2rem;margin-bottom:.4em;}
    p{line-height:1.6;color:#ddd;}
    a{color:#FFB020;}
    .badge{display:inline-block;padding:10px 22px;border:1px solid #FFB020;border-radius:24px;color:#FFB020;margin-top:24px;text-decoration:none;}
    footer{margin-top:64px;color:#888;font-size:.85rem;}
    
  @keyframes floatOrb {
    0%, 100% { transform: translate(0,0) scale(1); }
    50% { transform: translate(30px,-40px) scale(1.08); }
  }
  @keyframes fadeUp {
    from { opacity:0; transform: translateY(16px); }
    to { opacity:1; transform: translateY(0); }
  }
  .orb {
    position: fixed; top: -120px; right: -120px; width: 420px; height: 420px;
    background: radial-gradient(circle, #FFB02055 0%, #FFB02000 70%);
    filter: blur(10px); pointer-events: none; z-index: 0;
    animation: floatOrb 9s ease-in-out infinite;
  }
  .wrap { position: relative; z-index: 1; }
  h1 { animation: fadeUp 0.8s ease-out both; }
  p.tagline { animation: fadeUp 0.8s ease-out 0.15s both; }
  .feature { animation: fadeUp 0.8s ease-out both; transition: transform 0.25s ease; }
  .feature:nth-of-type(1) { animation-delay: 0.3s; }
  .feature:nth-of-type(2) { animation-delay: 0.45s; }
  .feature:hover { transform: translateY(-3px); }
  footer { animation: fadeUp 0.8s ease-out 0.6s both; }
</style></head><body>
<div class="orb"></div>
<div class="wrap">
<h1>Trialwatch</h1>
<p>Never get charged for a forgotten free trial again.</p>
<p>Log free trials with end dates and a countdown badge. Upgrade for: Multiple reminder tiers and cancel-link notes per trial.</p>
<a class="badge" href="privacy.html">Privacy Policy</a>
<a class="badge" href="terms.html">Terms of Use</a>
</div>
<footer>Contact: s0533495227@gmail.com</footer>
</body></html>
