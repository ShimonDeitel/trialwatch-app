name: Trialwatch
options:
  bundleIdPrefix: com.shimondeitel.trialwatch
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true
  groupSortPosition: top
settings:
  base:
    MARKETING_VERSION: "1.0"
    CURRENT_PROJECT_VERSION: "1"
    SWIFT_VERSION: "5.0"
    DEVELOPMENT_TEAM: "W7Q885Q59C"
    CODE_SIGN_STYLE: Automatic
    IPHONEOS_DEPLOYMENT_TARGET: "17.0"
    TARGETED_DEVICE_FAMILY: "1"
    ENABLE_USER_SCRIPT_SANDBOXING: "YES"
targets:
  Trialwatch:
    type: application
    platform: iOS
    sources:
      - path: Trialwatch
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shimondeitel.trialwatch
        TARGETED_DEVICE_FAMILY: "1"
        INFOPLIST_FILE: Trialwatch/Info.plist
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        ENABLE_PREVIEWS: "YES"
        GENERATE_INFOPLIST_FILE: "NO"
  TrialwatchTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: TrialwatchTests
      - path: Trialwatch.storekit
    dependencies:
      - target: Trialwatch
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shimondeitel.trialwatch.tests
        GENERATE_INFOPLIST_FILE: "YES"
        TARGETED_DEVICE_FAMILY: "1"
  TrialwatchUITests:
    type: bundle.ui-testing
    platform: iOS
    sources:
      - path: TrialwatchUITests
    dependencies:
      - target: Trialwatch
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shimondeitel.trialwatch.uitests
        GENERATE_INFOPLIST_FILE: "YES"
        TARGETED_DEVICE_FAMILY: "1"
schemes:
  Trialwatch:
    build:
      targets:
        Trialwatch: all
        TrialwatchTests: [test]
        TrialwatchUITests: [test]
    run:
      config: Debug
      storeKitConfiguration: Trialwatch.storekit
    test:
      config: Debug
      storeKitConfiguration: Trialwatch.storekit
      targets:
        - TrialwatchTests
        - TrialwatchUITests
    archive:
      config: Release
